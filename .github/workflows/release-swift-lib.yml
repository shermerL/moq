name: Release Swift Lib

# Publishes the ergonomic `Moq` Swift wrapper to the moq-dev/moq-swift mirror.
# This is the package most callers install; the raw `MoqFFI` bindings it depends
# on are built separately (release-swift-ffi.yml).
#
# Versioned independently of the moq-ffi crate: bump `swift/VERSION` by hand in a
# normal PR. On merge to main/dev this reads that version and publishes only if
# it isn't already tagged on the mirror. That tag check is the release gate (the
# same model release-plz uses for crates), so there's no separate tag to
# remember. The wrapper pins moq-ffi at .upToNextMinor and floats to the latest
# compatible patch, so a moq-ffi patch needs no wrapper re-release.

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "swift/VERSION"
      - "swift/Package.swift.template"
      - "swift/Sources/Moq/**"
      - "swift/Tests/**"
      - "swift/scripts/package.sh"
      - "swift/scripts/publish.sh"
      - "swift/scripts/verify.sh"
      - ".github/workflows/release-swift-lib.yml"
      - ".github/scripts/release.sh"
  pull_request:
    paths:
      - "swift/VERSION"
      - "swift/Package.swift.template"
      - "swift/Sources/Moq/**"
      - "swift/Tests/**"
      - "swift/scripts/package.sh"
      - "swift/scripts/publish.sh"
      - "swift/scripts/verify.sh"
      - ".github/workflows/release-swift-lib.yml"
      - ".github/scripts/release.sh"

permissions:
  contents: read

# Separate PR builds from mainline publishes so a PR run can't queue ahead of
# (and delay) a release on main.
concurrency:
  group: release-swift-lib-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wrapper package
    runs-on: macos-latest
    if: ${{ github.repository_owner == 'moq-dev' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      ffi_version: ${{ steps.version.outputs.ffi_version }}
      # On PRs we only build (dry-run). On main/dev we publish when the version
      # isn't already tagged on the mirror.
      publish: ${{ github.event_name == 'push' && steps.gate.outputs.exists == 'false' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Read versions
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < swift/VERSION)
          FFI_VERSION=$(grep '^version' rs/moq-ffi/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ffi_version=$FFI_VERSION" >> "$GITHUB_OUTPUT"
          echo "wrapper $VERSION, moq-ffi pin $FFI_VERSION"

      # The release gate: skip publishing a version already tagged on the mirror.
      # Runs on PRs too, as an informational dry-run.
      - name: Check mirror tag
        id: gate
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: .github/scripts/release.sh git-tag-exists moq-dev/moq-swift "$VERSION"

      - name: Package
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: ./swift/scripts/package.sh --version "$BUILD_VERSION" --output release-out

      - name: Upload Swift package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: swift-wrapper-package
          path: release-out/*

  verify:
    # Build a throwaway SPM consumer against the staged wrapper, which pulls the
    # published moq-swift-ffi transitively. Proves the moq-ffi pin resolves
    # against a real release before the wrapper reaches the mirror. Skipped (not
    # failed) when the pinned moq-ffi version isn't mirrored yet, so the first
    # bootstrap doesn't deadlock on a not-yet-published FFI package.
    name: Verify staged package resolves
    needs: [build]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check FFI mirror tag
        id: ffi
        env:
          FFI_VERSION: ${{ needs.build.outputs.ffi_version }}
        # Treat a missing mirror repo / unreachable remote as "not published"
        # rather than a hard failure, so the first bootstrap (before
        # moq-swift-ffi exists) skips the cross-package resolve instead of
        # failing the job. publish.sh stays idempotent regardless.
        run: .github/scripts/release.sh git-tag-exists moq-dev/moq-swift-ffi "$FFI_VERSION" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Download staged package
        if: steps.ffi.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: swift-wrapper-package
          path: artifacts

      - name: Resolve and build smoke consumer
        if: steps.ffi.outputs.exists == 'true'
        env:
          BUILD_VERSION: ${{ needs.build.outputs.version }}
        run: ./swift/scripts/verify.sh --tarball "artifacts/moq-${BUILD_VERSION}-swift.tar.gz"

      - name: Skip notice
        if: steps.ffi.outputs.exists != 'true'
        env:
          FFI_VERSION: ${{ needs.build.outputs.ffi_version }}
        run: echo "::notice::moq-swift-ffi ${FFI_VERSION} not published yet; skipping cross-package resolve."

  publish:
    name: Publish to Swift Package mirror
    needs: [build, verify]
    runs-on: ubuntu-latest
    if: ${{ needs.build.outputs.publish == 'true' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Generate moq-bot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: moq-dev
          repositories: moq-swift
          # Narrow the minted token to only what publish.sh needs.
          permission-contents: write

      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: swift-wrapper-package
          path: swift-out

      - name: Publish to moq-dev/moq-swift mirror
        env:
          BUILD_VERSION: ${{ needs.build.outputs.version }}
          # Token is minted fresh per run, expires in 1 hour, never at rest.
          SWIFT_MIRROR_TOKEN: ${{ steps.token.outputs.token }}
          GIT_AUTHOR_NAME: moq-bot
          GIT_AUTHOR_EMAIL: moq-bot[bot]@users.noreply.github.com
        run: ./swift/scripts/publish.sh

  publish-dry-run:
    name: Publish dry-run
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: swift-wrapper-package
          path: swift-out

      - name: Dry-run publish to mirror
        env:
          BUILD_VERSION: ${{ needs.build.outputs.version }}
        run: ./swift/scripts/publish.sh --dry-run
